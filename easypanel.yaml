services:
  - type: app
    name: local-tv
    description: "Digital Signage application with real-time sync"
    source:
      type: github
      owner: <your-github-username>    # UPDATE THIS
      repo: <your-repo-name>           # UPDATE THIS
      ref: main                        # Or the branch you wish to deploy
    build:
      type: dockerfile
      file: Dockerfile
    ports:
      - 3000:3000
    env:
      PORT: "3000"
      NODE_ENV: "production"
      LOG_REQUESTS: "1"
      DATA_DIR: "/data"
    mounts:
      - type: volume
        name: localtv_data
        mountPath: /data    # Persists data.db and /media
    # Publish behind an HTTPS domain in EasyPanel if you want microphone
    # support in /assistant outside localhost.
